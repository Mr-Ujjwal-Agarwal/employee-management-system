---
- name: Create backend application directory
  file:
    path: "{{ backend_app_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Create backend logs directory
  file:
    path: "{{ backend_log_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'
