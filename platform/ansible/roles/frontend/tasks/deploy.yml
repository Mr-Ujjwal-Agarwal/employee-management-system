---
- name: Create frontend application directory
  file:
    path: "{{ frontend_app_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Create frontend logs directory
  file:
    path: "{{ frontend_log_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'
