server {
    listen 80;
    server_name _;

    root /var/www/employee-management-system/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    error_page 404 /index.html;
}

