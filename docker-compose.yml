version: "3.9"

services:

  backend:
    container_name: employee-backend

    build:
      context: ./app/backend

    env_file:
      - ./app/backend/.env

    ports:
      - "8000:8000"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    container_name: employee-frontend

    build:
      context: ./app/frontend

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped
